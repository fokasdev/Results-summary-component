<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stlye.css">
</head>
<body>
    <main class="main-container">
        <section class="result-panel">
            <h2 class="panel-title">Your Result</h2>
            <div class="score-circle">
                <span class="score-num">76</span>
                <span class="score-total">of 100</span>
            </div>
            <div class="result-info">
                <h1 class="status">Great</h1>
                <p class="description">You scored higher than 65% of the people who have taken these tests.</p>
            </div>
        </section>

        <section class="summary-panel">
            <h2 class="summary-title">Summary</h2>
            <div class="stats-list">
                <div class="stat-item reaction">
                    <img src="icon-reaction.svg" alt=""><span>Reaction</span>
                    <p class="stat-score"><strong>80</strong> / 100</p>
                </div>
                <div class="stat-item memory">
                    <img src="icon-memory.svg" alt=""><span>Memory</span>
                    <p class="stat-score"><strong>92</strong> / 100</p>
                </div>
                <div class="stat-item verbal">
                    <img src="icon-verbal.svg" alt=""><span>Verbal</span>
                    <p class="stat-score"><strong>61</strong> / 100</p>
                </div>
                <div class="stat-item visual">
                    <img src="icon-visual.svg" alt=""><span>Visual</span>
                    <p class="stat-score"><strong>73</strong> / 100</p>
                </div>
            </div>
            <button class="continue-btn">Continue</button>
        </section>
    </main>
</body>
</html>
